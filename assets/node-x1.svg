<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" class="w-full h-full text-indigo-400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#0b0f19;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" fill="#0f172a" rx="16"/>
  <circle cx="100" cy="100" r="70" fill="url(#glow)" />
  <!-- Node Body -->
  <rect x="70" y="60" width="60" height="80" rx="8" fill="#1e293b" stroke="url(#grad1)" stroke-width="3"/>
  <!-- Status Light -->
  <circle cx="100" cy="80" r="5" fill="#34d399" />
  <!-- Internal CPU Grid -->
  <rect x="85" y="95" width="30" height="30" rx="4" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Sensors -->
  <line x1="100" y1="60" x2="100" y2="40" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="40" r="4" fill="#a78bfa" />
</svg>
