<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" class="w-full h-full text-indigo-400">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#0b0f19;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" fill="#0f172a" rx="16"/>
  <circle cx="100" cy="100" r="75" fill="url(#glow)" />
  <!-- Microchip Base -->
  <rect x="60" y="60" width="80" height="80" rx="8" fill="#1e293b" stroke="url(#grad4)" stroke-width="2.5"/>
  <!-- Pins (Left) -->
  <line x1="50" y1="75" x2="60" y2="75" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="90" x2="60" y2="90" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="105" x2="60" y2="105" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="120" x2="60" y2="120" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pins (Right) -->
  <line x1="140" y1="75" x2="150" y2="75" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="90" x2="150" y2="90" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="105" x2="150" y2="105" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="120" x2="150" y2="120" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <!-- OS Core Circles -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="url(#grad4)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="14" fill="#0ea5e9" />
</svg>
