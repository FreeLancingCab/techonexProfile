<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" class="w-full h-full text-indigo-400">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0b0f19;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" fill="#0f172a" rx="16"/>
  <circle cx="100" cy="100" r="80" fill="url(#glow)" />
  <!-- Rack Mount Chassis -->
  <rect x="40" y="80" width="120" height="40" rx="4" fill="#1e293b" stroke="url(#grad2)" stroke-width="2"/>
  <!-- Status Lights -->
  <circle cx="55" cy="100" r="3" fill="#10b981" />
  <circle cx="65" cy="100" r="3" fill="#10b981" />
  <circle cx="75" cy="100" r="3" fill="#f59e0b" />
  <!-- Ports -->
  <rect x="95" y="93" width="14" height="14" rx="2" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <rect x="115" y="93" width="14" height="14" rx="2" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <rect x="135" y="93" width="14" height="14" rx="2" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <!-- Antennas -->
  <line x1="60" y1="80" x2="50" y2="45" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="80" x2="150" y2="45" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
</svg>
