<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" class="w-full h-full text-indigo-400">
  <defs>
    <linearGradient id="upsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0b0f19;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0f172a" rx="16"/>
  <circle cx="100" cy="110" r="70" fill="url(#baseGlow)" />
  
  <!-- Tall Cabinet Chassis -->
  <rect x="65" y="30" width="70" height="140" rx="6" fill="#1e293b" stroke="url(#upsGrad)" stroke-width="3"/>
  <rect x="71" y="36" width="58" height="128" rx="4" fill="#0f172a"/>
  
  <!-- Rack Modules -->
  <!-- Mod 1 (Display Panel) -->
  <rect x="75" y="42" width="50" height="25" rx="2" fill="#1e293b"/>
  <rect x="80" y="47" width="22" height="15" rx="1" fill="#020617" stroke="#3b82f6" stroke-width="1"/>
  <line x1="83" y1="52" x2="95" y2="52" stroke="#00f2fe" stroke-width="2"/>
  <circle cx="112" cy="55" r="3" fill="#22c55e" />
  
  <!-- Mod 2 -->
  <rect x="75" y="73" width="50" height="22" rx="2" fill="#1e293b"/>
  <line x1="80" y1="84" x2="120" y2="84" stroke="#475569" stroke-dasharray="4 4" stroke-width="2"/>
  
  <!-- Mod 3 -->
  <rect x="75" y="101" width="50" height="22" rx="2" fill="#1e293b"/>
  <line x1="80" y1="112" x2="120" y2="112" stroke="#475569" stroke-dasharray="4 4" stroke-width="2"/>
  
  <!-- Mod 4 (Battery bank) -->
  <rect x="75" y="129" width="50" height="22" rx="2" fill="#1e293b"/>
  <circle cx="85" cy="140" r="2.5" fill="#f59e0b" />
  <circle cx="95" cy="140" r="2.5" fill="#10b981" />
</svg>
